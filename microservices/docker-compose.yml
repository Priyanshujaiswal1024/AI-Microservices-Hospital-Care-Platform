version: '3.9'

# ═══════════════════════════════════════════════════════════════════════════
# HMS Microservices — Local Development Docker Compose
# Includes: Kafka + Zookeeper + all 7 PostgreSQL databases + all 10 services
# Usage: docker-compose up -d
# ═══════════════════════════════════════════════════════════════════════════

networks:
  hms-network:
    driver: bridge

volumes:
  zookeeper-data:
  kafka-data:
  auth-db-data:
  doctor-db-data:
  patient-db-data:
  appointment-db-data:
  clinical-db-data:
  pharmacy-db-data:
  billing-db-data:

services:

  # ── Zookeeper (required by Kafka) ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: hms-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - hms-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka Broker ───────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: hms-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - hms-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Kafka UI (web interface to monitor topics/messages) ───────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: hms-kafka-ui
    ports:
      - "9090:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: hms-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - hms-network

  # ══════════════════════════════════════════════════════════════════════════
  # PostgreSQL databases — one per service
  # ══════════════════════════════════════════════════════════════════════════

  auth-db:
    image: postgres:16-alpine
    container_name: hms-auth-db
    environment:
      POSTGRES_DB: hms_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - hms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hms_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  doctor-db:
    image: postgres:16-alpine
    container_name: hms-doctor-db
    environment:
      POSTGRES_DB: hms_doctor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - doctor-db-data:/var/lib/postgresql/data
    networks:
      - hms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hms_doctor"]
      interval: 10s
      timeout: 5s
      retries: 5

  patient-db:
    image: postgres:16-alpine
    container_name: hms-patient-db
    environment:
      POSTGRES_DB: hms_patient
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - patient-db-data:/var/lib/postgresql/data
    networks:
      - hms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hms_patient"]
      interval: 10s
      timeout: 5s
      retries: 5

  appointment-db:
    image: postgres:16-alpine
    container_name: hms-appointment-db
    environment:
      POSTGRES_DB: hms_appointment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - appointment-db-data:/var/lib/postgresql/data
    networks:
      - hms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hms_appointment"]
      interval: 10s
      timeout: 5s
      retries: 5

  clinical-db:
    image: postgres:16-alpine
    container_name: hms-clinical-db
    environment:
      POSTGRES_DB: hms_clinical
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - clinical-db-data:/var/lib/postgresql/data
    networks:
      - hms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hms_clinical"]
      interval: 10s
      timeout: 5s
      retries: 5

  pharmacy-db:
    image: postgres:16-alpine
    container_name: hms-pharmacy-db
    environment:
      POSTGRES_DB: hms_pharmacy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pharmacy-db-data:/var/lib/postgresql/data
    networks:
      - hms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hms_pharmacy"]
      interval: 10s
      timeout: 5s
      retries: 5

  billing-db:
    image: postgres:16-alpine
    container_name: hms-billing-db
    environment:
      POSTGRES_DB: hms_billing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - billing-db-data:/var/lib/postgresql/data
    networks:
      - hms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hms_billing"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ══════════════════════════════════════════════════════════════════════════
  # Microservices
  # ══════════════════════════════════════════════════════════════════════════

  # ── Eureka Service Discovery ───────────────────────────────────────────────
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: hms-eureka-server
    ports:
      - "8761:8761"
    environment:
      EUREKA_USERNAME: admin
      EUREKA_PASSWORD: admin
      JDK_JAVA_OPTIONS: "-Xms128m -Xmx256m"
    networks:
      - hms-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: hms-auth-service
    ports:
      - "8089:8089"
    depends_on:
      auth-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/hms_auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRETKEY: ${JWT_SECRET}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@eureka-server:8761/eureka/
      JDK_JAVA_OPTIONS: "-Xms128m -Xmx256m"
    networks:
      - hms-network

  doctor-service:
    build:
      context: ./doctor-service
      dockerfile: Dockerfile
    container_name: hms-doctor-service
    ports:
      - "8082:8082"
    depends_on:
      doctor-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://doctor-db:5432/hms_doctor
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRETKEY: ${JWT_SECRET}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@eureka-server:8761/eureka/
      JDK_JAVA_OPTIONS: "-Xms128m -Xmx256m"
    networks:
      - hms-network

  appointment-service:
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    container_name: hms-appointment-service
    ports:
      - "8083:8083"
    depends_on:
      appointment-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://appointment-db:5432/hms_appointment
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRETKEY: ${JWT_SECRET}
      DOCTOR_SERVICE_URL: http://doctor-service:8082
      PATIENT_SERVICE_URL: http://patient-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@eureka-server:8761/eureka/
      JDK_JAVA_OPTIONS: "-Xms128m -Xmx256m"
    networks:
      - hms-network

  patient-service:
    build:
      context: ./patient-service
      dockerfile: Dockerfile
    container_name: hms-patient-service
    ports:
      - "8084:8084"
    depends_on:
      patient-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-db:5432/hms_patient
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRETKEY: ${JWT_SECRET}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@eureka-server:8761/eureka/
      JDK_JAVA_OPTIONS: "-Xms128m -Xmx256m"
    networks:
      - hms-network

  billing-service:
    build:
      context: ./billing-service
      dockerfile: Dockerfile
    container_name: hms-billing-service
    ports:
      - "8085:8085"
    depends_on:
      billing-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://billing-db:5432/hms_billing
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRETKEY: ${JWT_SECRET}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@eureka-server:8761/eureka/
      JDK_JAVA_OPTIONS: "-Xms128m -Xmx256m"
    networks:
      - hms-network

  pharmacy-service:
    build:
      context: ./pharmacy-service
      dockerfile: Dockerfile
    container_name: hms-pharmacy-service
    ports:
      - "8086:8086"
    depends_on:
      pharmacy-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://pharmacy-db:5432/hms_pharmacy
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRETKEY: ${JWT_SECRET}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@eureka-server:8761/eureka/
      JDK_JAVA_OPTIONS: "-Xms128m -Xmx256m"
    networks:
      - hms-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: hms-notification-service
    ports:
      - "8087:8087"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@eureka-server:8761/eureka/
      JDK_JAVA_OPTIONS: "-Xms128m -Xmx256m"
    networks:
      - hms-network

  clinical-service:
    build:
      context: ./clinical-service
      dockerfile: Dockerfile
    container_name: hms-clinical-service
    ports:
      - "8088:8088"
    depends_on:
      clinical-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://clinical-db:5432/hms_clinical
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRETKEY: ${JWT_SECRET}
      PHARMACY_SERVICE_URL: http://pharmacy-service:8086
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@eureka-server:8761/eureka/
      JDK_JAVA_OPTIONS: "-Xms128m -Xmx256m"
      GROQ_API_KEY: ${GROQ_API_KEY}
    networks:
      - hms-network

  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: hms-admin-service
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRETKEY: ${JWT_SECRET}
      DOCTOR_SERVICE_URL: http://doctor-service:8082
      PATIENT_SERVICE_URL: http://patient-service:8084
      APPOINTMENT_SERVICE_URL: http://appointment-service:8083
      BILLING_SERVICE_URL: http://billing-service:8085
      PHARMACY_SERVICE_URL: http://pharmacy-service:8086
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@eureka-server:8761/eureka/
      JDK_JAVA_OPTIONS: "-Xms128m -Xmx256m"
    networks:
      - hms-network

  # ── API Gateway (single entry point) ──────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: hms-api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - doctor-service
      - patient-service
      - appointment-service
      - billing-service
      - pharmacy-service
      - clinical-service
      - admin-service
    environment:
      JWT_SECRETKEY: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:8089
      DOCTOR_SERVICE_URL: http://doctor-service:8082
      
      APPOINTMENT_SERVICE_URL: http://appointment-service:8083
      PATIENT_SERVICE_URL: http://patient-service:8084
      BILLING_SERVICE_URL: http://billing-service:8085
      PHARMACY_SERVICE_URL: http://pharmacy-service:8086
      CLINICAL_SERVICE_URL: http://clinical-service:8088
      ADMIN_SERVICE_URL: http://admin-service:8081
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@eureka-server:8761/eureka/
      JDK_JAVA_OPTIONS: "-Xms128m -Xmx256m"
    networks:
      - hms-network
