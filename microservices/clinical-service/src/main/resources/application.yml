spring:
  application:
    name: clinical-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/hms_clinical
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # Spring AI via Groq (OpenAI-compatible)
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: ${GROQ_MODEL:llama-3.1-8b-instant}
          temperature: 0.3

server:
  port: 8088

jwt:
  secretKey: ${JWT_SECRET}

appointment:
  service:
    url: http://${APPOINTMENT_SERVICE_HOST:localhost}:8083
patient:
  service:
    url: http://${PATIENT_SERVICE_HOST:localhost}:8084
medicine:
  service:
    url: http://${PHARMACY_SERVICE_HOST:localhost}:8086
billing:
  service:
    url: http://${BILLING_SERVICE_HOST:localhost}:8085

logging:
  level:
    com.priyanshu.clinical: DEBUG

# Eureka Client Registration
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@${EUREKA_HOST:localhost}:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans
