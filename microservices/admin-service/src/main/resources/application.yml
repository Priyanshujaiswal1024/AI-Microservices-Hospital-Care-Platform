spring:
  application:
    name: admin-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: 8081

jwt:
  secretKey: ${JWT_SECRET}

# Service URLs
doctor:
  service:
    url: http://${DOCTOR_SERVICE_HOST:localhost}:8082
patient:
  service:
    url: http://${PATIENT_SERVICE_HOST:localhost}:8084
appointment:
  service:
    url: http://${APPOINTMENT_SERVICE_HOST:localhost}:8083
billing:
  service:
    url: http://${BILLING_SERVICE_HOST:localhost}:8085
pharmacy:
  service:
    url: http://${PHARMACY_SERVICE_HOST:localhost}:8086
auth:
  service:
    url: http://${AUTH_SERVICE_HOST:localhost}:8089

logging:
  level:
    com.priyanshu.admin: DEBUG

# Eureka Client Registration
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@${EUREKA_HOST:localhost}:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
